name: AI Linter & Dynamic Test Generator

on:
  push:
    branches:
      - master
      - nightly
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ai_assist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests pytest kodi-addon-checker

      - name: Run AI Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          # Set FULL_EVAL to true only if triggered manually via workflow_dispatch
          FULL_EVAL: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python .github/scripts/ai_engine.py
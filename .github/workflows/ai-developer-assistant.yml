name: AI Developer Assistant

on:
  push:
    branches:
      - master
      - nightly
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.check.outputs.python }}
      file_count: ${{ steps.check.outputs.file_count }}
      skip_ai: ${{ steps.check.outputs.skip_ai }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check for Python Changes
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Event: $EVENT_NAME"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          
          SKIP_AI="false"
          CHANGED=""
          FILE_COUNT=0
          DIFF_LINES=0
          
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "PR: Comparing $PR_BASE...$PR_SHA"
            git fetch origin $PR_BASE --depth=1 2>/dev/null || true
            CHANGED=$(git diff --name-only origin/$PR_BASE...$PR_SHA -- '*.py' 2>/dev/null || true)
            DIFF_LINES=$(git diff origin/$PR_BASE...$PR_SHA -- '*.py' 2>/dev/null | wc -l || true)
            
          elif [ "$EVENT_NAME" = "push" ]; then
            echo "Push: Comparing HEAD~1...HEAD"
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.py' 2>/dev/null || true)
            DIFF_LINES=$(git diff HEAD~1 HEAD -- '*.py' 2>/dev/null | wc -l || true)
            
          else
            echo "Manual trigger: No diff available"
            SKIP_AI="true"
          fi
          
          echo "Changed files: $CHANGED"
          echo "Diff lines: $DIFF_LINES"
          
          # Count changed files
          if [ -n "$CHANGED" ]; then
            FILE_COUNT=$(echo "$CHANGED" | grep -c '\.py$' || true)
          fi
          FILE_COUNT=${FILE_COUNT:-0}
          
          echo "python=false" >> $GITHUB_OUTPUT
          echo "skip_ai=true" >> $GITHUB_OUTPUT
          echo "file_count=0" >> $GITHUB_OUTPUT
          
          # Guard: Skip if no Python changes
          if [ -z "$CHANGED" ] || [ "$FILE_COUNT" -eq 0 ]; then
            echo "No Python file changes detected"
            exit 0
          fi
          
          # Guard: Skip if too many files changed (limit to 10)
          if [ "$FILE_COUNT" -gt 10 ]; then
            echo "Too many files changed ($FILE_COUNT > 10), skipping AI analysis"
            exit 0
          fi
          
          # Guard: Diff too large
          DIFF_LINES=${DIFF_LINES:-0}
          if [ "$DIFF_LINES" -gt 500 ]; then
            echo "Diff too large ($DIFF_LINES lines > 500), skipping AI analysis"
            exit 0
          fi
          
          # Guard: Check if changes are only whitespace/comments
          ACTUAL_CHANGES=0
          if [ "$EVENT_NAME" = "pull_request" ]; then
            ACTUAL_CHANGES=$(git diff origin/$PR_BASE...$PR_SHA -- '*.py' 2>/dev/null | grep -E "^[+-]" | grep -v "^[+-][+-][+-]" | grep -vE "^\s*[+-]\s*#" | grep -vE "^\s*[+-]\s*$" | wc -l || true)
          else
            ACTUAL_CHANGES=$(git diff HEAD~1 HEAD -- '*.py' 2>/dev/null | grep -E "^[+-]" | grep -v "^[+-][+-][+-]" | grep -vE "^\s*[+-]\s*#" | grep -vE "^\s*[+-]\s*$" | wc -l || true)
          fi
          ACTUAL_CHANGES=${ACTUAL_CHANGES:-0}
          
          if [ "$ACTUAL_CHANGES" -eq 0 ]; then
            echo "Only whitespace/comment changes, skipping AI analysis"
            exit 0
          fi
          
          echo "python=true" >> $GITHUB_OUTPUT
          echo "skip_ai=false" >> $GITHUB_OUTPUT
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo "Python changes detected ($FILE_COUNT files, $DIFF_LINES diff lines)"
          echo "$CHANGED"

  addon-check:
    name: Kodi Addon Checker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install kodi-addon-checker
        run: pip install kodi-addon-checker

      - name: Run Kodi Addon Checker
        id: kodi-check
        run: |
          kodi-addon-checker --branch omega plugin.video.pseudotv.live 2>&1 | tee kodi-raw-output.txt || true
          
          # # Format output to match other checkers
          # ERRORS=$(grep -c "^ERROR:" kodi-raw-output.txt 2>/dev/null | tr -d '[:space:]' || true)
          # WARNINGS=$(grep -c "^WARN:" kodi-raw-output.txt 2>/dev/null | tr -d '[:space:]' || true)
          # ERRORS=${ERRORS:-0}
          # WARNINGS=${WARNINGS:-0}
          
          # echo "Kodi Addon Checker" > kodi-check-output.txt
          # echo "============================================" >> kodi-check-output.txt
          
          # if [ "$ERRORS" -gt 0 ] 2>/dev/null || [ "$WARNINGS" -gt 0 ] 2>/dev/null; then
            # echo "ERRORS & WARNINGS: $ERRORS error(s), $WARNINGS warning(s) found" >> kodi-check-output.txt
            # echo "============================================" >> kodi-check-output.txt
            # echo "" >> kodi-check-output.txt
            
            # if [ "$ERRORS" -gt 0 ] 2>/dev/null; then
              # grep "^ERROR:" kodi-raw-output.txt >> kodi-check-output.txt || true
            # fi
            # if [ "$WARNINGS" -gt 0 ] 2>/dev/null; then
              # grep "^WARN:" kodi-raw-output.txt >> kodi-check-output.txt || true
            # fi
          # else
            # echo "No issues found" >> kodi-check-output.txt
          # fi
          
          # cat kodi-check-output.txt
          # echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          # echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Kodi Check Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kodi-addon-check-report
          path: kodi-check-output.txt
          retention-days: 30

  lint-ruff:
    name: Ruff Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: |
          ruff check plugin.video.pseudotv.live/resources/lib --select=E,F,W --output-format=concise 2>&1 | tee ruff-output.txt || true
        continue-on-error: true

      - name: Upload Ruff Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ruff-report
          path: ruff-output.txt
          retention-days: 30

  lint-xml:
    name: XML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate XML Files
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import glob
          import sys
          
          errors = []
          for f in glob.glob('**/*.xml', recursive=True):
              try:
                  ET.parse(f)
                  print(f'OK: {f}')
              except ET.ParseError as e:
                  print(f'ERROR: {f} - {e}')
                  errors.append(f'{f}: {e}')
          
          if errors:
              sys.exit(1)
          print('All XML files valid')
          " 2>&1 | tee xml-output.txt || true
        continue-on-error: true

      - name: Upload XML Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xml-report
          path: xml-output.txt
          retention-days: 30

  lint-json:
    name: JSON Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate JSON Files
        run: |
          python -c "
          import json
          import glob
          import sys
          
          errors = []
          for f in glob.glob('**/*.json', recursive=True):
              try:
                  with open(f) as fh:
                      json.load(fh)
                  print(f'OK: {f}')
              except json.JSONDecodeError as e:
                  print(f'ERROR: {f} - {e}')
                  errors.append(f'{f}: {e}')
          
          if errors:
              sys.exit(1)
          print('All JSON files valid')
          " 2>&1 | tee json-output.txt || true
        continue-on-error: true

      - name: Upload JSON Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: json-report
          path: json-output.txt
          retention-days: 30

  fstring-check:
    name: F-String Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run F-String Checker
        run: |
          python .github/scripts/fstring_check.py plugin.video.pseudotv.live/resources/lib 2>&1 | tee fstring-output.txt
        continue-on-error: true

      - name: Upload F-String Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fstring-report
          path: fstring-output.txt
          retention-days: 30

  lint:
    name: OpenCode Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true' && needs.changes.outputs.skip_ai == 'false'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Get Changed Files
        id: get-diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.ref }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            git fetch origin $BASE --depth=1 2>/dev/null || true
            git diff --name-only origin/$BASE...$HEAD -- '*.py' > lint_files.txt 2>/dev/null || true
          elif [ "${{ github.event_name }}" = "push" ]; then
            git diff --name-only HEAD~1 HEAD -- '*.py' > lint_files.txt 2>/dev/null || true
          fi
          echo "Files to lint: $(cat lint_files.txt 2>/dev/null | wc -l)"

      - name: Run OpenCode Lint
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          FILES=$(cat lint_files.txt | head -5)
          FILE_COUNT=$(cat lint_files.txt | wc -l)
          echo "Analyzing $FILE_COUNT file(s) (limited to 5)"
          opencode run --model opencode/mimo-v2.5-free --file "$FILES" "Lint these Python files for syntax errors, import errors, undefined variables, and security concerns. Only report actual issues found." 2>&1 | tee lint-output.txt
        continue-on-error: true

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: lint-output.txt
          retention-days: 30

  ai-review:
    name: AI Code Review & Test Generation
    runs-on: ubuntu-latest
    needs: [changes, addon-check, lint-ruff, lint-xml, lint-json, fstring-check, lint]
    if: needs.changes.outputs.python == 'true' && needs.changes.outputs.skip_ai == 'false'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pytest

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Get Changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.ref }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            git fetch origin $BASE --depth=1 2>/dev/null || true
            git diff origin/$BASE...$HEAD -- '*.py' 2>/dev/null | head -c 20000 > changes.diff || echo "" > changes.diff
            git diff --name-only origin/$BASE...$HEAD -- '*.py' 2>/dev/null | head -5 > changed_files.txt || true
          elif [ "${{ github.event_name }}" = "push" ]; then
            git diff HEAD~1 HEAD -- '*.py' 2>/dev/null | head -c 20000 > changes.diff || echo "" > changes.diff
            git diff --name-only HEAD~1 HEAD -- '*.py' 2>/dev/null | head -5 > changed_files.txt || true
          fi
          echo "Changed files: $(cat changed_files.txt 2>/dev/null | wc -l)"
          echo "Diff size: $(wc -c < changes.diff 2>/dev/null || echo 0) bytes"

      - name: AI Code Review
        id: ai-review
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          DIFF=$(cat changes.diff)
          FILES=$(cat changed_files.txt 2>/dev/null || echo "None")
          opencode run --model opencode/mimo-v2.5-free "Analyze the following code changes from a recent push to PseudoTV Live (Kodi addon). CHANGED FILES: $FILES CODE DIFF: $DIFF Focus on: 1. Does this change break existing functionality? 2. Are there any bugs or logic errors in the diff? 3. Does it follow the existing code patterns in the project? 4. Are there any missing imports or undefined variables? 5. Could this change cause issues with Kodi API compatibility? Provide a brief risk assessment (LOW/MEDIUM/HIGH) and specific findings if any issues exist." 2>&1 | tee ai-review-output.txt
        continue-on-error: true

      - name: Generate Dynamic Tests
        id: gen-tests
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          DIFF=$(cat changes.diff)
          FILES=$(cat changed_files.txt 2>/dev/null || echo "None")
          opencode run --model opencode/mimo-v2.5-free "Generate pytest tests specifically for these changed files in PseudoTV Live. CHANGED FILES: $FILES CODE DIFF: $DIFF Requirements: Test only the functions/classes that were modified, Mock xbmc/xbmcgui/xbmcaddon/xbmcplugin modules, Focus on edge cases in the changed code, Include tests that verify the change doesn't break existing behavior. Output ONLY the Python test code in a code block." 2>&1 | tee gen-tests-output.txt
        continue-on-error: true

      - name: Upload AI Review Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-review-reports
          path: |
            ai-review-output.txt
            gen-tests-output.txt
            changes.diff
            changed_files.txt
          retention-days: 30

      - name: Execute Generated Tests
        if: success()
        run: |
          TEST_FILE="test_dynamic_ai.py"
          if [ -f gen-tests-output.txt ]; then
            python -c "import re; content=open('gen-tests-output.txt').read(); match=re.search(r'\`\`\`python\n(.*?)\`\`\`', content, re.DOTALL); open('$TEST_FILE','w').write(match.group(1)) if match else None" 2>/dev/null || true
          fi
          if [ -f "$TEST_FILE" ]; then
            PYTHONPATH="$(pwd):$(pwd)/plugin.video.pseudotv.live/resources/lib" pytest "$TEST_FILE" -v || true
            rm -f "$TEST_FILE"
          fi

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, addon-check, lint-ruff, lint-xml, lint-json, fstring-check, lint, ai-review]
    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v7
        with:
          path: reports
        continue-on-error: true

      - name: Print Summary
        run: |
          echo ""
          echo "============================================"
          echo "   AI DEVELOPER ASSISTANT SUMMARY"
          echo "============================================"
          echo ""
          
          # Change Detection
          echo "CHANGE DETECTION"
          echo "--------------------------------------------"
          echo "Python Changes: ${{ needs.changes.outputs.python == 'true' && 'YES' || 'NO' }}"
          echo "Files Changed: ${{ needs.changes.outputs.file_count }}"
          echo "AI Analysis: ${{ needs.changes.outputs.skip_ai == 'true' && 'SKIPPED' || 'RUN' }}"
          echo ""
          
          # Status Overview
          echo "VALIDATION STATUS"
          echo "--------------------------------------------"
          ADDON="${{ needs.addon-check.result }}"
          FSTRING="${{ needs.fstring-check.result }}"
          RUFF="${{ needs.lint-ruff.result }}"
          XML="${{ needs.lint-xml.result }}"
          JSON="${{ needs.lint-json.result }}"
          LINT="${{ needs.lint.result }}"
          AI="${{ needs.ai-review.result }}"
          
          echo "Kodi Addon Checker: $(echo $ADDON | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')"
          echo "F-String Validation: $(echo $FSTRING | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')"
          echo "Ruff Linter: $(echo $RUFF | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')"
          echo "XML Validation: $(echo $XML | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')"
          echo "JSON Validation: $(echo $JSON | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')"
          echo "OpenCode Lint: $(echo $LINT | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')"
          echo "AI Code Review: $(echo $AI | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')"
          echo ""
          
          # Errors Summary
          echo "ERRORS & WARNINGS"
          echo "--------------------------------------------"
          
          # Ruff
          if [ -f reports/ruff-report/ruff-output.txt ]; then
            RUFF_ISSUES=$(grep -cE "^(warning|error)" reports/ruff-report/ruff-output.txt 2>/dev/null || echo "0")
            if [ "$RUFF_ISSUES" -gt 0 ]; then
              echo "Ruff: $RUFF_ISSUES issue(s)"
              grep -E "^(warning|error)" reports/ruff-report/ruff-output.txt | head -10 || true
            else
              echo "Ruff: No issues"
            fi
          fi
          
          # XML
          if [ -f reports/xml-report/xml-output.txt ]; then
            XML_ERRORS=$(grep -c "^ERROR:" reports/xml-report/xml-output.txt 2>/dev/null || echo "0")
            if [ "$XML_ERRORS" -gt 0 ]; then
              echo "XML: $XML_ERRORS error(s)"
              grep "^ERROR:" reports/xml-report/xml-output.txt || true
            else
              echo "XML: No issues"
            fi
          fi
          
          # JSON
          if [ -f reports/json-report/json-output.txt ]; then
            JSON_ERRORS=$(grep -c "^ERROR:" reports/json-report/json-output.txt 2>/dev/null || echo "0")
            if [ "$JSON_ERRORS" -gt 0 ]; then
              echo "JSON: $JSON_ERRORS error(s)"
              grep "^ERROR:" reports/json-report/json-output.txt || true
            else
              echo "JSON: No issues"
            fi
          fi
          
          # F-String
          if [ -f reports/fstring-report/fstring-output.txt ]; then
            FSTRING_ERRORS=$(grep -c "^ERRORS:" reports/fstring-report/fstring-output.txt 2>/dev/null | head -1 || echo "0")
            FSTRING_WARNINGS=$(grep -c "^WARNINGS:" reports/fstring-report/fstring-output.txt 2>/dev/null | head -1 || echo "0")
            if [ "$FSTRING_ERRORS" -gt 0 ] || [ "$FSTRING_WARNINGS" -gt 0 ]; then
              echo "F-String: $FSTRING_ERRORS error(s), $FSTRING_WARNINGS warning(s)"
              grep -E "^(ERRORS|WARNINGS):" reports/fstring-report/fstring-output.txt || true
            else
              echo "F-String: No issues"
            fi
          fi
          
          # Kodi Check
          if [ -f reports/kodi-addon-check-report/kodi-check-output.txt ]; then
            KODI_ERRORS=$(grep -c "^ERROR:" reports/kodi-addon-check-report/kodi-check-output.txt 2>/dev/null || echo "0")
            KODI_WARNINGS=$(grep -c "^WARN:" reports/kodi-addon-check-report/kodi-check-output.txt 2>/dev/null || echo "0")
            if [ "$KODI_ERRORS" -gt 0 ] || [ "$KODI_WARNINGS" -gt 0 ]; then
              echo "Kodi Checker: $KODI_ERRORS error(s), $KODI_WARNINGS warning(s)"
              grep "^ERROR:" reports/kodi-addon-check-report/kodi-check-output.txt | head -5 || true
              grep "^WARN:" reports/kodi-addon-check-report/kodi-check-output.txt | head -5 || true
            else
              echo "Kodi Checker: No issues"
            fi
          fi
          
          # Lint
          if [ -f reports/lint-report/lint-output.txt ]; then
            LINT_ISSUES=$(grep -cE "(error|Error|ERROR)" reports/lint-report/lint-output.txt 2>/dev/null || echo "0")
            if [ "$LINT_ISSUES" -gt 0 ]; then
              echo "Lint: $LINT_ISSUES issue(s) found"
              grep -E "(error|Error|ERROR)" reports/lint-report/lint-output.txt | head -5 || true
            else
              echo "Lint: No issues"
            fi
          fi
          
          # AI Review
          if [ -f reports/ai-review-reports/ai-review-output.txt ]; then
            AI_RISK=$(grep -i "risk" reports/ai-review-reports/ai-review-output.txt | head -1 || echo "")
            if [ -n "$AI_RISK" ]; then
              echo "AI Review: $AI_RISK"
            fi
          fi
          
          echo ""
          echo "============================================"
          echo "   END OF SUMMARY"
          echo "============================================"

      - name: Write Job Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## AI Developer Assistant Report
          
          ### Validation Results
          | Check | Status |
          |-------|--------|
          | Kodi Addon Checker | ${{ needs.addon-check.result == 'success' && '✅ Passed' || needs.addon-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | F-String Validation | ${{ needs.fstring-check.result == 'success' && '✅ Passed' || needs.fstring-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | Ruff Linter | ${{ needs.lint-ruff.result == 'success' && '✅ Passed' || needs.lint-ruff.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | XML Validation | ${{ needs.lint-xml.result == 'success' && '✅ Passed' || needs.lint-xml.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | JSON Validation | ${{ needs.lint-json.result == 'success' && '✅ Passed' || needs.lint-json.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | OpenCode Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || needs.lint.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | AI Code Review | ${{ needs.ai-review.result == 'success' && '✅ Passed' || needs.ai-review.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          
          ### Change Detection
          - **Python Changes:** ${{ needs.changes.outputs.python == 'true' && 'Yes' || 'No' }}
          - **Files Changed:** ${{ needs.changes.outputs.file_count || '0' }}
          - **AI Analysis:** ${{ needs.changes.outputs.skip_ai == 'true' && 'Skipped (guard rails)' || 'Run' }}
          EOF
          
          # Add ruff details
          if [ -f reports/ruff-report/ruff-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Ruff Linter" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -50 reports/ruff-report/ruff-output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          # Add XML details
          if [ -f reports/xml-report/xml-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### XML Validation" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat reports/xml-report/xml-output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          # Add JSON details
          if [ -f reports/json-report/json-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### JSON Validation" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat reports/json-report/json-output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          # Add f-string details
          if [ -f reports/fstring-report/fstring-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### F-String Checker" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat reports/fstring-report/fstring-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          # Add kodi check details
          if [ -f reports/kodi-addon-check-report/kodi-check-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Kodi Addon Checker" >> $GITHUB_STEP_SUMMARY
            ERRORS=$(grep -c "^ERROR:" reports/kodi-addon-check-report/kodi-check-output.txt 2>/dev/null || echo "0")
            WARNINGS=$(grep -c "^WARN:" reports/kodi-addon-check-report/kodi-check-output.txt 2>/dev/null || echo "0")
            echo "- **Errors:** $ERRORS" >> $GITHUB_STEP_SUMMARY
            echo "- **Warnings:** $WARNINGS" >> $GITHUB_STEP_SUMMARY
            if [ "$ERRORS" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '<details><summary>Error Details</summary>' >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep "^ERROR:" reports/kodi-addon-check-report/kodi-check-output.txt >> $GITHUB_STEP_SUMMARY || true
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo '</details>' >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            
            const addonResult = '${{ needs.addon-check.result }}';
            const fstringResult = '${{ needs.fstring-check.result }}';
            const ruffResult = '${{ needs.lint-ruff.result }}';
            const xmlResult = '${{ needs.lint-xml.result }}';
            const jsonResult = '${{ needs.lint-json.result }}';
            const lintResult = '${{ needs.lint.result }}';
            const aiResult = '${{ needs.ai-review.result }}';
            
            const statusIcon = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            
            let report = `## 🤖 AI Developer Assistant\n\n`;
            report += `### Validation Results\n`;
            report += `| Check | Status |\n|-------|--------|\n`;
            report += `| Kodi Addon Checker | ${statusIcon(addonResult)} ${addonResult} |\n`;
            report += `| F-String Validation | ${statusIcon(fstringResult)} ${fstringResult} |\n`;
            report += `| Ruff Linter | ${statusIcon(ruffResult)} ${ruffResult} |\n`;
            report += `| XML Validation | ${statusIcon(xmlResult)} ${xmlResult} |\n`;
            report += `| JSON Validation | ${statusIcon(jsonResult)} ${jsonResult} |\n`;
            report += `| OpenCode Lint | ${statusIcon(lintResult)} ${lintResult} |\n`;
            report += `| AI Code Review | ${statusIcon(aiResult)} ${aiResult} |\n\n`;
            
            // Add ruff issues
            try {
              const ruff = fs.readFileSync('reports/ruff-report/ruff-output.txt', 'utf8');
              const ruffIssues = (ruff.match(/^(warning|error)/gm) || []).length;
              if (ruffIssues > 0) {
                report += `### Ruff Linter\n`;
                report += '- **Issues:** ' + ruffIssues + '\n';
                report += '```\n' + ruff.substring(0, 500) + '\n```\n\n';
              }
            } catch(e) {}
            
            // Add XML issues
            try {
              const xml = fs.readFileSync('reports/xml-report/xml-output.txt', 'utf8');
              const xmlErrors = (xml.match(/^ERROR:/gm) || []).length;
              if (xmlErrors > 0) {
                report += `### XML Validation\n`;
                report += '```\n' + xml.substring(0, 500) + '\n```\n\n';
              }
            } catch(e) {}
            
            // Add JSON issues
            try {
              const json = fs.readFileSync('reports/json-report/json-output.txt', 'utf8');
              const jsonErrors = (json.match(/^ERROR:/gm) || []).length;
              if (jsonErrors > 0) {
                report += `### JSON Validation\n`;
                report += '```\n' + json.substring(0, 500) + '\n```\n\n';
              }
            } catch(e) {}
            
            // Add kodi errors
            try {
              const kodi = fs.readFileSync('reports/kodi-addon-check-report/kodi-check-output.txt', 'utf8');
              const errors = (kodi.match(/^ERROR:/gm) || []).length;
              const warnings = (kodi.match(/^WARN:/gm) || []).length;
              if (errors > 0 || warnings > 0) {
                report += `### Kodi Checker Details\n`;
                report += `- **Errors:** ${errors}\n- **Warnings:** ${warnings}\n\n`;
              }
            } catch(e) {}
            
            // Add f-string issues
            try {
              const fstr = fs.readFileSync('reports/fstring-report/fstring-output.txt', 'utf8');
              if (fstr.includes('issue(s) found')) {
                report += `### F-String Issues\n`;
                report += '```\n' + fstr.substring(0, 500) + '\n```\n\n';
              }
            } catch(e) {}
            
            report += `---\n*View workflow logs for full details*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

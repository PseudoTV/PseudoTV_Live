name: AI Developer Assistant

on:
  push:
    branches:
      - master
      - nightly
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.check.outputs.python }}
      xml: ${{ steps.check.outputs.xml }}
      json: ${{ steps.check.outputs.json }}
      any_code: ${{ steps.check.outputs.any_code }}
      file_count: ${{ steps.check.outputs.file_count }}
      strings_po: ${{ steps.check.outputs.strings_po }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check for Code Changes
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          PY_CHANGED=""
          XML_CHANGED=""
          JSON_CHANGED=""
          ALL_CHANGED=""
          
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch origin $PR_BASE 2>&1 || true
            PY_CHANGED=$(git diff --name-only origin/$PR_BASE...HEAD -- '*.py' 2>&1 || true)
            XML_CHANGED=$(git diff --name-only origin/$PR_BASE...HEAD -- '*.xml' 2>&1 || true)
            JSON_CHANGED=$(git diff --name-only origin/$PR_BASE...HEAD -- '*.json' 2>&1 || true)
            ALL_CHANGED=$(git diff --name-only origin/$PR_BASE...HEAD 2>&1 || true)
          elif [ "$EVENT_NAME" = "push" ]; then
            PY_CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.py' 2>&1 || true)
            XML_CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.xml' 2>&1 || true)
            JSON_CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.json' 2>&1 || true)
            ALL_CHANGED=$(git diff --name-only HEAD~1 HEAD 2>&1 || true)
          fi
          
          PY_COUNT=0; XML_COUNT=0; JSON_COUNT=0; TOTAL_COUNT=0
          [ -n "$PY_CHANGED" ] && PY_COUNT=$(echo "$PY_CHANGED" | grep -c '\.py$' || true)
          [ -n "$XML_CHANGED" ] && XML_COUNT=$(echo "$XML_CHANGED" | grep -c '\.xml$' || true)
          [ -n "$JSON_CHANGED" ] && JSON_COUNT=$(echo "$JSON_CHANGED" | grep -c '\.json$' || true)
          [ -n "$ALL_CHANGED" ] && TOTAL_COUNT=$(echo "$ALL_CHANGED" | grep -c '.' || true)
          
          echo "python=false" >> $GITHUB_OUTPUT
          echo "xml=false" >> $GITHUB_OUTPUT
          echo "json=false" >> $GITHUB_OUTPUT
          echo "any_code=false" >> $GITHUB_OUTPUT
          if [ "${PY_COUNT:-0}" -gt 0 ]; then echo "python=true" >> $GITHUB_OUTPUT; fi
          if [ "${XML_COUNT:-0}" -gt 0 ]; then echo "xml=true" >> $GITHUB_OUTPUT; fi
          if [ "${JSON_COUNT:-0}" -gt 0 ]; then echo "json=true" >> $GITHUB_OUTPUT; fi
          
          if [ "${PY_COUNT:-0}" -gt 0 ] || [ "${XML_COUNT:-0}" -gt 0 ] || [ "${JSON_COUNT:-0}" -gt 0 ]; then
            echo "any_code=true" >> $GITHUB_OUTPUT
          fi
          echo "file_count=${TOTAL_COUNT:-0}" >> $GITHUB_OUTPUT
          # Check for en_gb strings.po changes
          STRINGS_CHANGED=""
          if [ "$EVENT_NAME" = "pull_request" ]; then
            STRINGS_CHANGED=$(git diff --name-only origin/$PR_BASE...HEAD -- 'plugin.video.pseudotv.live/resources/language/resource.language.en_gb/strings.po' 2>&1 || true)
          elif [ "$EVENT_NAME" = "push" ]; then
            STRINGS_CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'plugin.video.pseudotv.live/resources/language/resource.language.en_gb/strings.po' 2>&1 || true)
          fi
          STRINGS_COUNT=0
          [ -n "$STRINGS_CHANGED" ] && STRINGS_COUNT=$(echo "$STRINGS_CHANGED" | grep -c 'strings.po$' || true)
          echo "strings_po=false" >> $GITHUB_OUTPUT
          if [ "${STRINGS_COUNT:-0}" -gt 0 ]; then echo "strings_po=true" >> $GITHUB_OUTPUT; fi

  check-prev:
    name: Check Previous Run
    runs-on: ubuntu-latest
    outputs:
      prev_failed: ${{ steps.check.outputs.prev_failed }}
      prev_has_code: ${{ steps.check.outputs.prev_has_code }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 4
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Check Previous Workflow
        id: check
        run: |
          echo "prev_failed=false" >> "$GITHUB_OUTPUT"
          echo "prev_has_code=false" >> "$GITHUB_OUTPUT"
          
          check_commit() {
            local SHA=$1
            local PREV=$2
            
            if [ -z "$SHA" ] || [ "$SHA" = "0000000000000000000000000000000000000000" ]; then
              return 1
            fi
            
            # Check code changes between this commit and its child
            HAS_CHANGES=$(git diff --name-only "$SHA" "$PREV" -- '*.py' '*.xml' '*.json' 2>/dev/null | head -1)
            
            # Check if workflow failed
            RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs?head_sha=$SHA&per_page=1" 2>/dev/null || echo '{"workflow_runs":[]}')
            
            CONCLUSION=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('workflow_runs',[{}])[0].get('conclusion','none'))" 2>/dev/null || echo "none")
            
            echo "Commit $SHA: changes=$([ -n "$HAS_CHANGES" ] && echo "yes" || echo "no"), conclusion=$CONCLUSION"
            
            # Found a failed run with code changes - we're done
            if [ "$CONCLUSION" = "failure" ] && [ -n "$HAS_CHANGES" ]; then
              echo "prev_failed=true" >> "$GITHUB_OUTPUT"
              echo "prev_has_code=true" >> "$GITHUB_OUTPUT"
              return 0
            fi
            
            # Failed but no code changes - keep looking
            if [ "$CONCLUSION" = "failure" ]; then
              return 1
            fi
            
            # Not a failure - stop looking
            return 0
          }
          
          PREV_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          
          # Check up to 3 commits back
          SHA="$PREV_SHA"
          CHILD="$HEAD_SHA"
          for i in 1 2 3; do
            if ! check_commit "$SHA" "$CHILD"; then
              # Get parent for next iteration
              CHILD="$SHA"
              SHA=$(git rev-parse "$SHA^" 2>/dev/null || echo "")
            else
              break
            fi
          done

  translate:
    name: AI Translation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Check for strings.po Changes
        id: check-strings
        run: |
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1 2>/dev/null || true
            CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- 'plugin.video.pseudotv.live/resources/language/resource.language.en_gb/strings.po' 2>/dev/null || true)
          elif [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'plugin.video.pseudotv.live/resources/language/resource.language.en_gb/strings.po' 2>/dev/null || true)
          fi
          if [ -n "$CHANGED" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed en_GB strings.po: $CHANGED"
          fi
      - name: Exit if No Changes
        if: steps.check-strings.outputs.has_changes != 'true'
        run: exit 0

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Generate Translations
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EN_GB_FILE="plugin.video.pseudotv.live/resources/language/resource.language.en_gb/strings.po"
          
          if [ ! -f "$EN_GB_FILE" ]; then
            echo "en_GB strings.po not found"
            exit 0
          fi
          
          # Get diff of en_GB changes
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.ref }}"
            git fetch origin $BASE --depth=1 2>/dev/null || true
            DIFF=$(git diff origin/$BASE...HEAD -- "$EN_GB_FILE" 2>/dev/null | head -c 30000 || true)
          elif [ "${{ github.event_name }}" = "push" ]; then
            DIFF=$(git diff HEAD~1 HEAD -- "$EN_GB_FILE" 2>/dev/null | head -c 30000 || true)
          fi
          
          if [ -z "$DIFF" ]; then
            echo "No changes detected in en_GB strings.po"
            exit 0
          fi
          
          # Extract changed msgctxt IDs from diff
          CHANGED_IDS=$(echo "$DIFF" | grep -oP 'msgctxt "#\K[0-9]+' | sort -u || true)
          
          if [ -z "$CHANGED_IDS" ]; then
            echo "No new/changed string IDs detected"
            exit 0
          fi
          
          echo "Changed string IDs: $CHANGED_IDS"
          
          # Top 5 Kodi languages by user base
          LANGUAGES=(
            "enGB:English (United Kingdom)"
            "esES:Spanish (Spain)"
            "deDE:German (Germany)"
            "frFR:French (France)"
            "ptBR:Portuguese (Brazil)"
          )
          
          # Generate translations for each language
          for LANG_CODE_NAME in "${LANGUAGES[@]}"; do
            LANG_CODE="${LANG_CODE_NAME%%:*}"
            LANG_NAME="${LANG_CODE_NAME#*:}"
            
            # Skip en_GB (source language)
            if [ "$LANG_CODE" = "enGB" ]; then
              continue
            fi
            
            # Convert lang code format: enGB -> resource.language.en_gb
            FOLDER_CODE=$(echo "$LANG_CODE" | sed 's/\([a-z][a-z]\)\([A-Z][A-Z]\)/\L\1_\L\2/')
            LANG_DIR="plugin.video.pseudotv.live/resources/language/resource.language.${FOLDER_CODE}"
            LANG_FILE="${LANG_DIR}/strings.po"
            
            # Create directory if not exists
            mkdir -p "$LANG_DIR"
            
            # Build translation prompt with changed strings
            STRINGS_TO_TRANSLATE=""
            for ID in $CHANGED_IDS; do
              # Extract msgid for this ID from en_GB file
              MSGID=$(awk -v id="#$ID" '/msgctxt/{
                ctx=$0
                getline
                if ($0 ~ /msgid/) {
                  msgid=$0
                  sub(/msgid "/, "", msgid)
                  sub(/"$/, "", msgid)
                  print ctx "|" msgid
                }
              }' "$EN_GB_FILE" | grep "#$ID" | head -1 | cut -d'|' -f2-)
              
              if [ -n "$MSGID" ]; then
                STRINGS_TO_TRANSLATE="${STRINGS_TO_TRANSLATE}#${ID}|${MSGID}\n"
              fi
            done
            
            if [ -z "$STRINGS_TO_TRANSLATE" ]; then
              echo "No strings to translate for $LANG_NAME"
              continue
            fi
            
            echo "Translating $(echo "$CHANGED_IDS" | wc -w) strings to $LANG_NAME..."
            
            # Call AI for translation
            PROMPT="Translate these Kodi addon UI strings from English to ${LANG_NAME}. Keep all placeholders (%s, [B], [/B], [COLOR=...], [CR], {name}, {group}) unchanged. Only output translations in format: #ID|translation Strings: $(echo -e "$STRINGS_TO_TRANSLATE")"
            
            TRANSLATIONS=$(opencode run --model opencode/mimo-v2.5-free "$PROMPT" 2>&1 | grep -E '^[0-9]+\|' || true)
            
            if [ -z "$TRANSLATIONS" ]; then
              echo "Translation failed for $LANG_NAME, skipping"
              continue
            fi
            
            # Generate strings.po file
            {
              echo '# Kodi Media Center language file'
              echo '# Addon Name: "PseudoTV Live"'
              echo '# Addon id: plugin.video.pseudotv.live'
              echo '# Addon Provider: Lunatixz'
              echo 'msgid ""'
              echo 'msgstr ""'
              echo '"Project-Id-Version: plugin.video.pseudotv.live\\n"'
              echo '"Report-Msgid-Bugs-To: \\n"'
              echo '"POT-Creation-Date: YEAR-MO-DA HO:MI+ZONE\\n"'
              echo '"PO-Revision-Date: YEAR-MO-DA HO:MI+ZONE\\n"'
              echo '"Last-Translator: Lunatixz Translation Team\\n"'
              echo "\"Language-Team: ${LANG_NAME}\\n\""
              echo '"MIME-Version: 1.0\\n"'
              echo '"Content-Type: text/plain; charset=UTF-8\\n"'
              echo '"Content-Transfer-Encoding: 8bit\\n"'
              echo "\"Language: ${FOLDER_CODE}\\n\""
              echo '"Plural-Forms: nplurals=2; plural=(n != 1);\\n"'
            } > "$LANG_FILE"
            
            # Append translated strings
            while IFS='|' read -r ID TRANSLATION; do
              ID=$(echo "$ID" | tr -d ' ')
              TRANSLATION=$(echo "$TRANSLATION" | sed 's/"/\\"/g')
              echo "" >> "$LANG_FILE"
              echo "msgctxt \"${ID}\"" >> "$LANG_FILE"
              echo "msgid \"$(grep -A1 "msgctxt \"${ID}\"" "$EN_GB_FILE" | grep 'msgid' | sed 's/msgid "//;s/"$//')\"" >> "$LANG_FILE"
              echo "msgstr \"${TRANSLATION}\"" >> "$LANG_FILE"
            done <<< "$TRANSLATIONS"
            
            echo "Created $LANG_FILE"
          done
          
          echo "Translation complete"
          
          # Check if there are any changes
          if git diff --quiet plugin.video.pseudotv.live/resources/language/ 2>/dev/null; then
            echo "No translation changes to commit"
          else
            # Create branch and commit
            BRANCH_NAME="translations/$(date +%Y%m%d-%H%M%S)"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH_NAME"
            git add plugin.video.pseudotv.live/resources/language/
            STRING_COUNT=$(echo "$CHANGED_IDS" | wc -w)
            LANG_COUNT=$(( ${#LANGUAGES[@]} - 1 ))
            git commit -m "Auto-translations: ${STRING_COUNT} strings translated to ${LANG_COUNT} languages"
            git push origin "$BRANCH_NAME"
            
            # Create PR
            BODY="Automated translation update for ${STRING_COUNT} changed strings across ${LANG_COUNT} languages."
            gh pr create --title "Auto-Translations: ${STRING_COUNT} strings" --body "$BODY" --base master --head "$BRANCH_NAME" --label "translations" 2>&1 || echo "PR creation failed or already exists"
            
            echo "status=pr_created" >> $GITHUB_OUTPUT
            echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
          fi
          
          # Generate report
          {
            echo "## AI Translation Report"
            echo ""
            echo "**Changed string IDs:** ${CHANGED_IDS}"
            echo ""
            echo "**Languages translated:** ${LANG_COUNT}"
            echo ""
            if git diff --quiet plugin.video.pseudotv.live/resources/language/ 2>/dev/null; then
              echo "**Status:** No translation changes needed"
            else
              echo "**Status:** PR created for review"
            fi
          } > translate-report.md
        continue-on-error: true
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: translate-report
          path: translate-report.md
          retention-days: 30

  addon-check:
    name: Kodi Addon Checker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install kodi-addon-checker
        run: pip install kodi-addon-checker
      - name: Run Kodi Addon Checker
        id: kodi-check
        run: |
          kodi-addon-checker --branch omega plugin.video.pseudotv.live > kodi-raw.txt 2>&1 || true
          
          ERRORS=$(grep -c "^ERROR:" kodi-raw.txt || echo "0")
          WARNINGS=$(grep -c "^WARN:" kodi-raw.txt || echo "0")
          
          # Clean up - remove carriage returns and whitespace
          ERRORS=$(echo "$ERRORS" | tr -d '[:space:]')
          WARNINGS=$(echo "$WARNINGS" | tr -d '[:space:]')
          
          echo "errors=$ERRORS" >> "$GITHUB_OUTPUT"
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
          
          {
            echo "## Kodi Addon Checker"
            echo ""
            if [ "$ERRORS" -gt 0 ] || [ "$WARNINGS" -gt 0 ]; then
              echo "| Severity | Count |"
              echo "|----------|-------|"
              echo "| Errors | $ERRORS |"
              echo "| Warnings | $WARNINGS |"
              echo ""
              echo '```'
              grep -E "^(ERROR|WARN):" kodi-raw.txt || true
              echo '```'
            else
              echo "No issues found."
            fi
          } > kodi-check-report.md
          
          # Fail if there are errors
          if [ "$ERRORS" -gt 0 ]; then
            exit 1
          fi
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kodi-check-report
          path: kodi-check-report.md
          retention-days: 30

  lint-ruff:
    name: Ruff Linter
    runs-on: ubuntu-latest
    outputs:
      has_errors: ${{ steps.check-ruff.outputs.has_errors }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        id: check-ruff
        run: |
          ruff check plugin.video.pseudotv.live/resources/lib --select=F,E9,W6 --ignore=F401,F403,F405 --output-format=concise 2>&1 > ruff-raw.txt || true
          
          ISSUES=$(grep -cE "^[^ ].*:[0-9]+:[0-9]+:" ruff-raw.txt 2>/dev/null || echo "0")
          echo "issues=${ISSUES:-0}" >> $GITHUB_OUTPUT
          
          if [ "${ISSUES:-0}" -gt 0 ]; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
          
          {
            echo "## Ruff Linter"
            echo ""
            if [ "${ISSUES:-0}" -gt 0 ]; then
              echo "**${ISSUES} issue(s) found**"
              echo ""
              echo '```'
              cat ruff-raw.txt
              echo '```'
            else
              echo "No issues found."
            fi
          } > ruff-report.md
        continue-on-error: true
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ruff-report
          path: ruff-report.md
          retention-days: 30

  lint-xml:
    name: XML Validation
    runs-on: ubuntu-latest
    outputs:
      has_errors: ${{ steps.check-xml.outputs.has_errors }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Validate XML Files
        id: check-xml
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import glob
          errors = []
          ok_files = []
          for f in glob.glob('**/*.xml', recursive=True):
              try:
                  ET.parse(f)
                  ok_files.append(f)
              except ET.ParseError as e:
                  errors.append(f'{f}: {e}')
          
          print(f'OK: {len(ok_files)} files')
          for e in errors:
              print(f'ERROR: {e}')
          " > xml-raw.txt 2>&1 || true
          
          if grep -q "^ERROR:" xml-raw.txt 2>/dev/null; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
          
          ERROR_COUNT=$(grep -c "^ERROR:" xml-raw.txt || echo "0")
          {
            echo "## XML Validation"
            echo ""
            if [ "${ERROR_COUNT:-0}" -gt 0 ]; then
              echo "**${ERROR_COUNT} error(s) found**"
              echo ""
              echo '```'
              grep "^ERROR:" xml-raw.txt || true
              echo '```'
            else
              echo "All XML files valid."
            fi
          } > xml-report.md
        continue-on-error: true
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xml-report
          path: xml-report.md
          retention-days: 30

  lint-json:
    name: JSON Validation
    runs-on: ubuntu-latest
    outputs:
      has_errors: ${{ steps.check-json.outputs.has_errors }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Validate JSON Files
        id: check-json
        run: |
          python -c "
          import json
          import glob
          errors = []
          ok_files = []
          for f in glob.glob('**/*.json', recursive=True):
              try:
                  with open(f) as fh:
                      json.load(fh)
                  ok_files.append(f)
              except json.JSONDecodeError as e:
                  errors.append(f'{f}: {e}')
          
          print(f'OK: {len(ok_files)} files')
          for e in errors:
              print(f'ERROR: {e}')
          " > json-raw.txt 2>&1 || true
          
          if grep -q "^ERROR:" json-raw.txt 2>/dev/null; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
          
          ERROR_COUNT=$(grep -c "^ERROR:" json-raw.txt || echo "0")
          {
            echo "## JSON Validation"
            echo ""
            if [ "${ERROR_COUNT:-0}" -gt 0 ]; then
              echo "**${ERROR_COUNT} error(s) found**"
              echo ""
              echo '```'
              grep "^ERROR:" json-raw.txt || true
              echo '```'
            else
              echo "All JSON files valid."
            fi
          } > json-report.md
        continue-on-error: true
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: json-report
          path: json-report.md
          retention-days: 30

  fstring-check:
    name: F-String Validation
    runs-on: ubuntu-latest
    outputs:
      has_errors: ${{ steps.check-fstring.outputs.has_errors }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run F-String Checker
        id: check-fstring
        run: |
          python .github/scripts/fstring_check.py plugin.video.pseudotv.live/resources/lib 2>&1 > fstring-raw.txt || true
          
          if grep -q "^ERRORS:" fstring-raw.txt 2>/dev/null; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
          
          {
            echo "## F-String Validation"
            echo ""
            if grep -q "^ERRORS:" fstring-raw.txt 2>/dev/null; then
              echo "**Issues found**"
              echo ""
              echo '```'
              cat fstring-raw.txt
              echo '```'
            else
              echo "No issues found."
            fi
          } > fstring-report.md
        continue-on-error: true
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fstring-report
          path: fstring-report.md
          retention-days: 30

  lint:
    name: OpenCode Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    outputs:
      has_errors: ${{ steps.check-lint.outputs.has_errors }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash
      - name: Get Changed Files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.ref }}"
            git fetch origin $BASE --depth=1 2>/dev/null || true
            git diff --name-only origin/$BASE...HEAD -- '*.py' > lint_files.txt 2>/dev/null || true
          elif [ "${{ github.event_name }}" = "push" ]; then
            git diff --name-only HEAD~1 HEAD -- '*.py' > lint_files.txt 2>/dev/null || true
          fi
      - name: Run OpenCode Lint
        id: check-lint
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          FILES=$(cat lint_files.txt | head -5)
          if [ -z "$FILES" ]; then
            echo "No Python files changed"
            echo "has_errors=false" >> $GITHUB_OUTPUT
            echo "No changes detected" > lint-report.md
            exit 0
          fi
          
          # Lint each file separately
          for FILE in $FILES; do
            opencode run --model opencode/mimo-v2.5-free --file "$FILE" "Lint this Python file for syntax errors, import errors, undefined variables, and security concerns. Only report actual issues found." 2>&1 >> lint-raw.txt || true
          done
          
          if grep -qiE "(error|issue|problem)" lint-raw.txt 2>/dev/null; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
          
          {
            echo "## OpenCode Lint"
            echo ""
            if grep -qiE "(error|issue|problem)" lint-raw.txt 2>/dev/null; then
              echo "**Issues found**"
              echo ""
              echo '```'
              cat lint-raw.txt
              echo '```'
            else
              echo "No issues found."
            fi
          } > lint-report.md
        continue-on-error: true
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: lint-report.md
          retention-days: 30

  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    needs: [changes, addon-check, lint-ruff, lint-xml, lint-json, fstring-check, lint, check-prev]
    if: |
      always() && needs.changes.outputs.any_code == 'true' && (
        needs.lint-ruff.outputs.has_errors == 'true' ||
        needs.lint-xml.outputs.has_errors == 'true' ||
        needs.lint-json.outputs.has_errors == 'true' ||
        needs.fstring-check.outputs.has_errors == 'true' ||
        needs.lint.outputs.has_errors == 'true' ||
        needs.addon-check.result == 'failure' ||
        (needs.check-prev.outputs.prev_failed == 'true' && needs.check-prev.outputs.prev_has_code == 'true')
      )
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash
      - name: Get Changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.ref }}"
            git fetch origin $BASE --depth=1 2>/dev/null || true
            git diff origin/$BASE...HEAD -- '*.py' '*.xml' '*.json' 2>/dev/null | head -c 20000 > changes.diff || echo "" > changes.diff
            git diff --name-only origin/$BASE...HEAD -- '*.py' '*.xml' '*.json' 2>/dev/null | head -10 > changed_files.txt || true
          elif [ "${{ github.event_name }}" = "push" ]; then
            git diff HEAD~1 HEAD -- '*.py' '*.xml' '*.json' 2>/dev/null | head -c 20000 > changes.diff || echo "" > changes.diff
            git diff --name-only HEAD~1 HEAD -- '*.py' '*.xml' '*.json' 2>/dev/null | head -10 > changed_files.txt || true
          fi
      - name: AI Code Review
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          DIFF=$(cat changes.diff | head -c 10000)
          FILES=$(cat changed_files.txt 2>/dev/null || echo "None")
          
          OPENCODE_OUTPUT=$(opencode run --model opencode/mimo-v2.5-free "Review PseudoTV Live code changes. FILES: $FILES DIFF: $DIFF Check: 1) Breaking changes 2) Bugs 3) Pattern violations 4) Missing imports 5) Kodi compatibility. Risk: LOW/MEDIUM/HIGH" 2>&1 || true)
          
          {
            echo "## AI Code Review"
            echo ""
            echo "$OPENCODE_OUTPUT" | sed 's/[[:cntrl:]]//g' || true
          } > ai-review-report.md
        continue-on-error: true
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-review-report
          path: ai-review-report.md
          retention-days: 30

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, addon-check, lint-ruff, lint-xml, lint-json, fstring-check, lint, ai-review, translate, check-prev]
    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v7
        with:
          path: reports
        continue-on-error: true

      - name: Write Job Summary
        if: always()
        run: |
          cat > $GITHUB_STEP_SUMMARY << 'HEADER'
          ## AI Developer Assistant Report
          
          ### Validation Results
          | Check | Status | Details |
          |-------|--------|---------|
          HEADER
          
          echo "| Kodi Addon Checker | ${{ needs.addon-check.result == 'success' && '✅ Passed' || needs.addon-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} | [View Report](#kodi-addon-checker) |" >> $GITHUB_STEP_SUMMARY
          echo "| F-String Validation | ${{ needs.fstring-check.result == 'success' && '✅ Passed' || needs.fstring-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} | [View Report](#f-string-validation) |" >> $GITHUB_STEP_SUMMARY
          echo "| Ruff Linter | ${{ needs.lint-ruff.result == 'success' && '✅ Passed' || needs.lint-ruff.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} | [View Report](#ruff-linter) |" >> $GITHUB_STEP_SUMMARY
          echo "| XML Validation | ${{ needs.lint-xml.result == 'success' && '✅ Passed' || needs.lint-xml.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} | [View Report](#xml-validation) |" >> $GITHUB_STEP_SUMMARY
          echo "| JSON Validation | ${{ needs.lint-json.result == 'success' && '✅ Passed' || needs.lint-json.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} | [View Report](#json-validation) |" >> $GITHUB_STEP_SUMMARY
          echo "| OpenCode Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || needs.lint.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} | [View Report](#opencode-lint) |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Code Review | ${{ needs.ai-review.result == 'success' && '✅ Passed' || needs.ai-review.result == 'skipped' && '⏭️ Skipped (no lint issues)' || '❌ Failed' }} | [View Report](#ai-code-review) |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Translation | ${{ needs.translate.result == 'success' && '✅ Generated' || needs.translate.result == 'skipped' && '⏭️ Skipped (no strings.po changes)' || needs.translate.result == 'failure' && '❌ Failed' || '⏭️ N/A' }} | [View Report](#ai-translation) |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Change Detection" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ needs.changes.outputs.python == 'true' && 'Yes' || 'No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| XML | ${{ needs.changes.outputs.xml == 'true' && 'Yes' || 'No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JSON | ${{ needs.changes.outputs.json == 'true' && 'Yes' || 'No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Strings.po | ${{ needs.changes.outputs.strings_po == 'true' && 'Yes (AI Translation Triggered)' || 'No' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Files | ${{ needs.changes.outputs.file_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Detailed Reports" >> $GITHUB_STEP_SUMMARY
          
          for report in reports/*/*.md; do
            if [ -f "$report" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              cat "$report" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const addonResult = '${{ needs.addon-check.result }}';
            const fstringResult = '${{ needs.fstring-check.result }}';
            const ruffResult = '${{ needs.lint-ruff.result }}';
            const xmlResult = '${{ needs.lint-xml.result }}';
            const jsonResult = '${{ needs.lint-json.result }}';
            const lintResult = '${{ needs.lint.result }}';
            const aiResult = '${{ needs.ai-review.result }}';
            const translateResult = '${{ needs.translate.result }}';
            
            const statusIcon = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            
            let report = `## AI Developer Assistant\n\n`;
            report += `### Validation Results\n`;
            report += `| Check | Status |\n|-------|--------|\n`;
            report += `| Kodi Addon Checker | ${statusIcon(addonResult)} ${addonResult} |\n`;
            report += `| F-String Validation | ${statusIcon(fstringResult)} ${fstringResult} |\n`;
            report += `| Ruff Linter | ${statusIcon(ruffResult)} ${ruffResult} |\n`;
            report += `| XML Validation | ${statusIcon(xmlResult)} ${xmlResult} |\n`;
            report += `| JSON Validation | ${statusIcon(jsonResult)} ${jsonResult} |\n`;
            report += `| OpenCode Lint | ${statusIcon(lintResult)} ${lintResult} |\n`;
            report += `| AI Code Review | ${statusIcon(aiResult)} ${aiResult} |\n`;
            report += `| AI Translation | ${statusIcon(translateResult)} ${translateResult} |\n\n`;
            
            // Add detailed findings from reports
            const reportFiles = [
              { name: 'Ruff Linter', file: 'reports/ruff-report/ruff-report.md', icon: '🔍' },
              { name: 'XML Validation', file: 'reports/xml-report/xml-report.md', icon: '📄' },
              { name: 'JSON Validation', file: 'reports/json-report/json-report.md', icon: '📋' },
              { name: 'F-String Checker', file: 'reports/fstring-report/fstring-report.md', icon: '📝' },
              { name: 'Kodi Checker', file: 'reports/kodi-check-report/kodi-check-report.md', icon: '🎬' },
              { name: 'OpenCode Lint', file: 'reports/lint-report/lint-report.md', icon: '🤖' },
              { name: 'AI Review', file: 'reports/ai-review-report/ai-review-report.md', icon: '🧠' },
              { name: 'AI Translation', file: 'reports/translate-report/translate-report.md', icon: '🌐' }
            ];
            
            for (const rf of reportFiles) {
              try {
                const content = fs.readFileSync(rf.file, 'utf8');
                const hasIssues = content.includes('**') && (content.includes('issue') || content.includes('error') || content.includes('Error'));
                if (hasIssues) {
                  report += `\n### ${rf.icon} ${rf.name}\n`;
                  // Extract just the key findings
                  const lines = content.split('\n');
                  for (const line of lines) {
                    if (line.includes('**') || line.includes('ERROR') || line.includes('error')) {
                      report += `${line}\n`;
                    }
                  }
                }
              } catch(e) {}
            }
            
            report += `\n---\n*View workflow run for full details*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

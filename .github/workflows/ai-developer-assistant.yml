name: AI Developer Assistant

on:
  push:
    branches:
      - master
      - nightly
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.check.outputs.python }}
      xml: ${{ steps.check.outputs.xml }}
      json: ${{ steps.check.outputs.json }}
      any_code: ${{ steps.check.outputs.any_code }}
      file_count: ${{ steps.check.outputs.file_count }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Check for Code Changes
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "=== Change Detection ==="
          echo "Event: $EVENT_NAME"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "PR Base: $PR_BASE"
          echo "PR SHA: $PR_SHA"
          
          PY_CHANGED=""
          XML_CHANGED=""
          JSON_CHANGED=""
          ALL_CHANGED=""
          
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "Fetching base branch: $PR_BASE"
            git fetch origin $PR_BASE 2>&1 || true
            echo "Comparing: origin/$PR_BASE...HEAD"
            PY_CHANGED=$(git diff --name-only origin/$PR_BASE...HEAD -- '*.py' 2>&1 || true)
            XML_CHANGED=$(git diff --name-only origin/$PR_BASE...HEAD -- '*.xml' 2>&1 || true)
            JSON_CHANGED=$(git diff --name-only origin/$PR_BASE...HEAD -- '*.json' 2>&1 || true)
            ALL_CHANGED=$(git diff --name-only origin/$PR_BASE...HEAD 2>&1 || true)
            
          elif [ "$EVENT_NAME" = "push" ]; then
            echo "Comparing: HEAD~1...HEAD"
            PY_CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.py' 2>&1 || true)
            XML_CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.xml' 2>&1 || true)
            JSON_CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*.json' 2>&1 || true)
            ALL_CHANGED=$(git diff --name-only HEAD~1 HEAD 2>&1 || true)
            
          else
            echo "Manual trigger"
          fi
          
          echo ""
          echo "Raw git diff output:"
          echo "${ALL_CHANGED:-<empty>}"
          echo ""
          
          PY_COUNT=0
          XML_COUNT=0
          JSON_COUNT=0
          TOTAL_COUNT=0
          
          if [ -n "$PY_CHANGED" ]; then
            PY_COUNT=$(echo "$PY_CHANGED" | grep -c '\.py$' || true)
          fi
          if [ -n "$XML_CHANGED" ]; then
            XML_COUNT=$(echo "$XML_CHANGED" | grep -c '\.xml$' || true)
          fi
          if [ -n "$JSON_CHANGED" ]; then
            JSON_COUNT=$(echo "$JSON_CHANGED" | grep -c '\.json$' || true)
          fi
          if [ -n "$ALL_CHANGED" ]; then
            TOTAL_COUNT=$(echo "$ALL_CHANGED" | grep -c '.' || true)
          fi
          
          PY_COUNT=${PY_COUNT:-0}
          XML_COUNT=${XML_COUNT:-0}
          JSON_COUNT=${JSON_COUNT:-0}
          TOTAL_COUNT=${TOTAL_COUNT:-0}
          
          echo "Python files changed: $PY_COUNT"
          echo "XML files changed: $XML_COUNT"
          echo "JSON files changed: $JSON_COUNT"
          echo "Total files changed: $TOTAL_COUNT"
          
          echo "python=false" >> $GITHUB_OUTPUT
          echo "xml=false" >> $GITHUB_OUTPUT
          echo "json=false" >> $GITHUB_OUTPUT
          echo "any_code=false" >> $GITHUB_OUTPUT
          
          if [ "$PY_COUNT" -gt 0 ]; then
            echo "python=true" >> $GITHUB_OUTPUT
          fi
          if [ "$XML_COUNT" -gt 0 ]; then
            echo "xml=true" >> $GITHUB_OUTPUT
          fi
          if [ "$JSON_COUNT" -gt 0 ]; then
            echo "json=true" >> $GITHUB_OUTPUT
          fi
          
          if [ "$PY_COUNT" -gt 0 ] || [ "$XML_COUNT" -gt 0 ] || [ "$JSON_COUNT" -gt 0 ]; then
            echo "any_code=true" >> $GITHUB_OUTPUT
            echo "file_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT
            echo "RESULT: Code changes detected"
          else
            echo "file_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT
            echo "RESULT: No code changes"
          fi

  addon-check:
    name: Kodi Addon Checker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install kodi-addon-checker
        run: pip install kodi-addon-checker

      - name: Run Kodi Addon Checker
        id: kodi-check
        run: |
          kodi-addon-checker --branch omega plugin.video.pseudotv.live 2>&1 | sed 's/[^[[:alnum:][:space:]._-]//g' > kodi-check-output.txt || true
          
          ERRORS=$(grep -c "^ERROR:" kodi-check-output.txt 2>/dev/null | tr -d '[:space:]' || true)
          WARNINGS=$(grep -c "^WARN:" kodi-check-output.txt 2>/dev/null | tr -d '[:space:]' || true)
          ERRORS=${ERRORS:-0}
          WARNINGS=${WARNINGS:-0}
          
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Kodi Check Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kodi-addon-check-report
          path: kodi-check-output.txt
          retention-days: 30

  lint-ruff:
    name: Ruff Linter
    runs-on: ubuntu-latest
    outputs:
      has_errors: ${{ steps.check-ruff.outputs.has_errors }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        id: check-ruff
        run: |
          ruff check plugin.video.pseudotv.live/resources/lib --select=F,E9,W6 --output-format=concise 2>&1 | tee ruff-output.txt || true
          
          ISSUES=$(grep -cE "^[^ ].*:[0-9]+:[0-9]+:" ruff-output.txt 2>/dev/null || echo "0")
          ISSUES=${ISSUES:-0}
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT
          
          if [ "$ISSUES" -gt 0 ]; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Upload Ruff Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ruff-report
          path: ruff-output.txt
          retention-days: 30

  lint-xml:
    name: XML Validation
    runs-on: ubuntu-latest
    outputs:
      has_errors: ${{ steps.check-xml.outputs.has_errors }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate XML Files
        id: check-xml
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import glob
          import sys
          
          errors = []
          for f in glob.glob('**/*.xml', recursive=True):
              try:
                  ET.parse(f)
                  print(f'OK: {f}')
              except ET.ParseError as e:
                  print(f'ERROR: {f} - {e}')
                  errors.append(f'{f}: {e}')
          
          if errors:
              sys.exit(1)
          print('All XML files valid')
          " 2>&1 | tee xml-output.txt || true
          
          if grep -q "^ERROR:" xml-output.txt 2>/dev/null; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Upload XML Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xml-report
          path: xml-output.txt
          retention-days: 30

  lint-json:
    name: JSON Validation
    runs-on: ubuntu-latest
    outputs:
      has_errors: ${{ steps.check-json.outputs.has_errors }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Validate JSON Files
        id: check-json
        run: |
          python -c "
          import json
          import glob
          import sys
          
          errors = []
          for f in glob.glob('**/*.json', recursive=True):
              try:
                  with open(f) as fh:
                      json.load(fh)
                  print(f'OK: {f}')
              except json.JSONDecodeError as e:
                  print(f'ERROR: {f} - {e}')
                  errors.append(f'{f}: {e}')
          
          if errors:
              sys.exit(1)
          print('All JSON files valid')
          " 2>&1 | tee json-output.txt || true
          
          if grep -q "^ERROR:" json-output.txt 2>/dev/null; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Upload JSON Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: json-report
          path: json-output.txt
          retention-days: 30

  fstring-check:
    name: F-String Validation
    runs-on: ubuntu-latest
    outputs:
      has_errors: ${{ steps.check-fstring.outputs.has_errors }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run F-String Checker
        id: check-fstring
        run: |
          python .github/scripts/fstring_check.py plugin.video.pseudotv.live/resources/lib 2>&1 | tee fstring-output.txt
          
          if grep -q "^ERRORS:" fstring-output.txt 2>/dev/null; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Upload F-String Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fstring-report
          path: fstring-output.txt
          retention-days: 30

  lint:
    name: OpenCode Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.python == 'true'
    outputs:
      has_errors: ${{ steps.check-lint.outputs.has_errors }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Get Changed Files
        id: get-diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.ref }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            git fetch origin $BASE --depth=1 2>/dev/null || true
            git diff --name-only origin/$BASE...$HEAD -- '*.py' > lint_files.txt 2>/dev/null || true
          elif [ "${{ github.event_name }}" = "push" ]; then
            git diff --name-only HEAD~1 HEAD -- '*.py' > lint_files.txt 2>/dev/null || true
          fi
          echo "Files to lint: $(cat lint_files.txt 2>/dev/null | wc -l)"

      - name: Run OpenCode Lint
        id: check-lint
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          FILES=$(cat lint_files.txt | head -5)
          FILE_COUNT=$(cat lint_files.txt | wc -l)
          echo "Analyzing $FILE_COUNT file(s) (limited to 5)"
          opencode run --model opencode/mimo-v2.5-free --file "$FILES" "Lint these Python files for syntax errors, import errors, undefined variables, and security concerns. Only report actual issues found." 2>&1 | tee lint-output.txt || true
          
          if grep -qiE "(error|issue|problem)" lint-output.txt 2>/dev/null; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: lint-output.txt
          retention-days: 30

  ai-review:
    name: AI Code Review & Test Generation
    runs-on: ubuntu-latest
    needs: [changes, addon-check, lint-ruff, lint-xml, lint-json, fstring-check, lint]
    if: |
      always() && needs.changes.outputs.any_code == 'true' && (
        needs.lint-ruff.outputs.has_errors == 'true' ||
        needs.lint-xml.outputs.has_errors == 'true' ||
        needs.lint-json.outputs.has_errors == 'true' ||
        needs.fstring-check.outputs.has_errors == 'true' ||
        needs.lint.outputs.has_errors == 'true' ||
        needs.addon-check.result == 'failure'
      )
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install pytest

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Get Changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.ref }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            git fetch origin $BASE --depth=1 2>/dev/null || true
            git diff origin/$BASE...$HEAD -- '*.py' '*.xml' '*.json' 2>/dev/null | head -c 20000 > changes.diff || echo "" > changes.diff
            git diff --name-only origin/$BASE...$HEAD -- '*.py' '*.xml' '*.json' 2>/dev/null | head -10 > changed_files.txt || true
          elif [ "${{ github.event_name }}" = "push" ]; then
            git diff HEAD~1 HEAD -- '*.py' '*.xml' '*.json' 2>/dev/null | head -c 20000 > changes.diff || echo "" > changes.diff
            git diff --name-only HEAD~1 HEAD -- '*.py' '*.xml' '*.json' 2>/dev/null | head -10 > changed_files.txt || true
          fi
          echo "Changed files: $(cat changed_files.txt 2>/dev/null | wc -l)"
          echo "Diff size: $(wc -c < changes.diff 2>/dev/null || echo 0) bytes"

      - name: AI Code Review
        id: ai-review
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          DIFF=$(cat changes.diff)
          FILES=$(cat changed_files.txt 2>/dev/null || echo "None")
          
          echo "AI Code Review" > ai-review-output.txt
          echo "============================================" >> ai-review-output.txt
          
          OPENCODE_OUTPUT=$(opencode run --model opencode/mimo-v2.5-free "Analyze the following code changes from a recent push to PseudoTV Live (Kodi addon). CHANGED FILES: $FILES CODE DIFF: $DIFF Focus on: 1. Does this change break existing functionality? 2. Are there any bugs or logic errors in the diff? 3. Does it follow the existing code patterns in the project? 4. Are there any missing imports or undefined variables? 5. Could this change cause issues with Kodi API compatibility? Provide a brief risk assessment (LOW/MEDIUM/HIGH) and specific findings if any issues exist." 2>&1 || true)
          
          echo "$OPENCODE_OUTPUT" | sed 's/[^[[:alnum:][:space:]._-]//g' >> ai-review-output.txt || true
          
          cat ai-review-output.txt
        continue-on-error: true

      - name: Generate Dynamic Tests
        id: gen-tests
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          DIFF=$(cat changes.diff)
          FILES=$(cat changed_files.txt 2>/dev/null || echo "None")
          
          echo "AI Test Generation (Changed Items Only)" > gen-tests-output.txt
          echo "============================================" >> gen-tests-output.txt
          echo "AI will only generate tests for RECENTLY CHANGED functions/classes." >> gen-tests-output.txt
          echo "" >> gen-tests-output.txt
          
          OPENCODE_OUTPUT=$(opencode run --model opencode/mimo-v2.5-free "Generate pytest tests ONLY for the RECENTLY CHANGED functions/classes in these files. CHANGED FILES: $FILES CODE DIFF: $DIFF Requirements: Test only the NEW or MODIFIED functions/classes. Mock xbmc/xbmcgui/xbmcaddon/xbmcplugin modules. Focus on edge cases in the changed code. If the changes are minor (variable renames, comments, whitespace), output 'No new tests needed'. Output ONLY the Python test code in a code block." 2>&1 || true)
          
          echo "$OPENCODE_OUTPUT" | sed 's/[^[[:alnum:][:space:]._-]//g' >> gen-tests-output.txt || true
          
          cat gen-tests-output.txt
        continue-on-error: true

      - name: Upload AI Review Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-review-reports
          path: |
            ai-review-output.txt
            gen-tests-output.txt
            changes.diff
            changed_files.txt
          retention-days: 30

      - name: Execute Generated Tests
        if: success()
        run: |
          TEST_FILE="test_dynamic_ai.py"
          if [ -f gen-tests-output.txt ]; then
            python -c "import re; content=open('gen-tests-output.txt').read(); match=re.search(r'\`\`\`python\n(.*?)\`\`\`', content, re.DOTALL); open('$TEST_FILE','w').write(match.group(1)) if match else None" 2>/dev/null || true
          fi
          if [ -f "$TEST_FILE" ]; then
            PYTHONPATH="$(pwd):$(pwd)/plugin.video.pseudotv.live/resources/lib" pytest "$TEST_FILE" -v || true
            rm -f "$TEST_FILE"
          fi

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, addon-check, lint-ruff, lint-xml, lint-json, fstring-check, lint, ai-review]
    steps:
      - name: Download All Reports
        uses: actions/download-artifact@v7
        with:
          path: reports
        continue-on-error: true

      - name: Print Summary
        run: |
          echo ""
          echo "============================================"
          echo "   AI DEVELOPER ASSISTANT SUMMARY"
          echo "============================================"
          echo ""
          
          echo "CHANGE DETECTION"
          echo "--------------------------------------------"
          echo "Python Changes: ${{ needs.changes.outputs.python == 'true' && 'YES' || 'NO' }}" | sed 's/^/  /'
          echo "XML Changes: ${{ needs.changes.outputs.xml == 'true' && 'YES' || 'NO' }}" | sed 's/^/  /'
          echo "JSON Changes: ${{ needs.changes.outputs.json == 'true' && 'YES' || 'NO' }}" | sed 's/^/  /'
          echo "Files Changed: ${{ needs.changes.outputs.file_count }}" | sed 's/^/  /'
          echo ""
          
          echo "VALIDATION STATUS"
          echo "--------------------------------------------"
          ADDON="${{ needs.addon-check.result }}"
          FSTRING="${{ needs.fstring-check.result }}"
          RUFF="${{ needs.lint-ruff.result }}"
          XML="${{ needs.lint-xml.result }}"
          JSON="${{ needs.lint-json.result }}"
          LINT="${{ needs.lint.result }}"
          AI="${{ needs.ai-review.result }}"
          
          echo "Kodi Addon Checker: $(echo $ADDON | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')" | sed 's/^/  /'
          echo "F-String Validation: $(echo $FSTRING | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')" | sed 's/^/  /'
          echo "Ruff Linter: $(echo $RUFF | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')" | sed 's/^/  /'
          echo "XML Validation: $(echo $XML | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')" | sed 's/^/  /'
          echo "JSON Validation: $(echo $JSON | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')" | sed 's/^/  /'
          echo "OpenCode Lint: $(echo $LINT | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')" | sed 's/^/  /'
          echo "AI Code Review: $(echo $AI | sed 's/success/PASSED/;s/failure/FAILED/;s/skipped/SKIPPED/;s/cancelled/CANCELLED/')" | sed 's/^/  /'
          echo ""
          
          echo "AI triggered: ${{ needs.ai-review.result != 'skipped' && 'YES' || 'NO' }}" | sed 's/^/  /'
          
          echo ""
          echo "============================================"
          echo "   END OF SUMMARY"
          echo "============================================"

      - name: Write Job Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## AI Developer Assistant Report
          
          ### Validation Results
          | Check | Status |
          |-------|--------|
          | Kodi Addon Checker | ${{ needs.addon-check.result == 'success' && '✅ Passed' || needs.addon-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | F-String Validation | ${{ needs.fstring-check.result == 'success' && '✅ Passed' || needs.fstring-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | Ruff Linter | ${{ needs.lint-ruff.result == 'success' && '✅ Passed' || needs.lint-ruff.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | XML Validation | ${{ needs.lint-xml.result == 'success' && '✅ Passed' || needs.lint-xml.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | JSON Validation | ${{ needs.lint-json.result == 'success' && '✅ Passed' || needs.lint-json.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | OpenCode Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || needs.lint.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |
          | AI Code Review | ${{ needs.ai-review.result == 'success' && '✅ Passed' || needs.ai-review.result == 'skipped' && '⏭️ Skipped (no lint issues)' || '❌ Failed' }} |
          EOF
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Change Detection" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Python Changes: ${{ needs.changes.outputs.python == 'true' && 'YES' || 'NO' }}" >> $GITHUB_STEP_SUMMARY
          echo "XML Changes: ${{ needs.changes.outputs.xml == 'true' && 'YES' || 'NO' }}" >> $GITHUB_STEP_SUMMARY
          echo "JSON Changes: ${{ needs.changes.outputs.json == 'true' && 'YES' || 'NO' }}" >> $GITHUB_STEP_SUMMARY
          echo "Files Changed: ${{ needs.changes.outputs.file_count || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          if [ -f reports/ruff-report/ruff-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Ruff Linter" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -50 reports/ruff-report/ruff-output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f reports/xml-report/xml-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### XML Validation" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat reports/xml-report/xml-output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f reports/json-report/json-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### JSON Validation" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat reports/json-report/json-output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f reports/fstring-report/fstring-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### F-String Checker" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat reports/fstring-report/fstring-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f reports/kodi-addon-check-report/kodi-check-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Kodi Addon Checker" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat reports/kodi-addon-check-report/kodi-check-output.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            
            const addonResult = '${{ needs.addon-check.result }}';
            const fstringResult = '${{ needs.fstring-check.result }}';
            const ruffResult = '${{ needs.lint-ruff.result }}';
            const xmlResult = '${{ needs.lint-xml.result }}';
            const jsonResult = '${{ needs.lint-json.result }}';
            const lintResult = '${{ needs.lint.result }}';
            const aiResult = '${{ needs.ai-review.result }}';
            
            const statusIcon = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            
            let report = `## AI Developer Assistant\n\n`;
            report += `### Validation Results\n`;
            report += `| Check | Status |\n|-------|--------|\n`;
            report += `| Kodi Addon Checker | ${statusIcon(addonResult)} ${addonResult} |\n`;
            report += `| F-String Validation | ${statusIcon(fstringResult)} ${fstringResult} |\n`;
            report += `| Ruff Linter | ${statusIcon(ruffResult)} ${ruffResult} |\n`;
            report += `| XML Validation | ${statusIcon(xmlResult)} ${xmlResult} |\n`;
            report += `| JSON Validation | ${statusIcon(jsonResult)} ${jsonResult} |\n`;
            report += `| OpenCode Lint | ${statusIcon(lintResult)} ${lintResult} |\n`;
            report += `| AI Code Review | ${statusIcon(aiResult)} ${aiResult} |\n\n`;
            
            report += `*AI review only runs when linter issues are found.*\n\n`;
            
            try {
              const ruff = fs.readFileSync('reports/ruff-report/ruff-output.txt', 'utf8');
              const ruffIssues = (ruff.match(/^(warning|error)/gm) || []).length;
              if (ruffIssues > 0) {
                report += `### Ruff Linter\n`;
                report += '- **Issues:** ' + ruffIssues + '\n';
                report += '```\n' + ruff.substring(0, 500) + '\n```\n\n';
              }
            } catch(e) {}
            
            try {
              const xml = fs.readFileSync('reports/xml-report/xml-output.txt', 'utf8');
              const xmlErrors = (xml.match(/^ERROR:/gm) || []).length;
              if (xmlErrors > 0) {
                report += `### XML Validation\n`;
                report += '```\n' + xml.substring(0, 500) + '\n```\n\n';
              }
            } catch(e) {}
            
            try {
              const json = fs.readFileSync('reports/json-report/json-output.txt', 'utf8');
              const jsonErrors = (json.match(/^ERROR:/gm) || []).length;
              if (jsonErrors > 0) {
                report += `### JSON Validation\n`;
                report += '```\n' + json.substring(0, 500) + '\n```\n\n';
              }
            } catch(e) {}
            
            try {
              const kodi = fs.readFileSync('reports/kodi-addon-check-report/kodi-check-output.txt', 'utf8');
              const errors = (kodi.match(/^ERROR:/gm) || []).length;
              const warnings = (kodi.match(/^WARN:/gm) || []).length;
              if (errors > 0 || warnings > 0) {
                report += `### Kodi Checker Details\n`;
                report += `- **Errors:** ${errors}\n- **Warnings:** ${warnings}\n\n`;
              }
            } catch(e) {}
            
            try {
              const fstr = fs.readFileSync('reports/fstring-report/fstring-output.txt', 'utf8');
              if (fstr.includes('issue(s) found')) {
                report += `### F-String Issues\n`;
                report += '```\n' + fstr.substring(0, 500) + '\n```\n\n';
              }
            } catch(e) {}
            
            report += `---\n*View workflow logs for full details*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

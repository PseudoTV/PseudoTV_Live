name: AI Linter & Dynamic Test Generator

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch: # <-- Add this line to enable manual triggering!

permissions:
  contents: read
  pull-requests: write

jobs:
  ai_assist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important: gets the git history to compare diffs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest kodi-addon-checker

      - name: Run AI Assistant Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }} # Your OpenAI/Anthropic/Gemini API key
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/ai_engine.py